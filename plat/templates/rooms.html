{% extends 'base.html' %}
{% load static %}


{% block content %}

<section class="container-fluid">
    <p><span id="room-name"></span></p>
</section>

<section id="video-streams"></section>

<section id="screen-container"></section>

<section id="control-wrapper">
    <div class="icon-wrapper">
        <img class="icon-control" id="mic-btn" src="{% static 'img/1.png' %}">
    </div>
     <div class="icon-wrapper">
        <img class="icon-control" id="cam-btn" src="{% static 'img/3.png' %}">
    </div>
    <div class="icon-wrapper">
        <img class="icon-control" id="leave-btn" src="{% static 'img/5.png' %}">
    </div>
    <div class="icon-wrapper">
        <img class="icon-control" id="share-screen-btn" src="{% static 'img/7.png' %}">
    </div>
    <div class="icon-wrapper" id="host-controls">
        <img class = "icon-control" data-bs-toggle="offcanvas" href="#offcanvasExample" role="button" aria-controls="offcanvasTop" src="{% static 'img/6.png' %}">
        <div class="offcanvas offcanvas-end" tabindex="-1" id="offcanvasExample" aria-labelledby="offcanvasExampleLabel">
            <div class="offcanvas-header">
                <h5 class="offcanvas-title" id="offcanvasExampleLabel">Meeting Details</h5>
                <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
            </div>
            <div class="offcanvas-body">
                <div>
                    <h6>Participants</h6>
                </div>
                <div id="participant-list" class="pb-3"></div>
                <div>
                    <button class="btn btn-primary" id="create-breakout-btn">
                        Join Breakout Rooms 
                    </button>
                    <div id="breakout-list"></div>
                    <div class="py-3">
                        <button onclick="returnToMainRoom()" class="btn btn-success">
                            Join Main Room
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<script type="text/javascript"src="{% static 'assets/AgoraRTC_N-4.24.3.js' %}"></script>
<script type="text/javascript" src="{% static 'jss/streams.js' %}"></script>


{% endblock %}
